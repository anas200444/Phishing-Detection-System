{% extends "base.html" %}
{% block title %}Email Headers | Phishing Detection{% endblock %}
{% block content %}
<section class="module-screen module-email">
    <div class="analysis-card scanner-card">
        <div class="module-heading">
            <div class="module-icon icon-email"><i class="far fa-envelope"></i></div>
            <div>
                <h1>Email Headers</h1>
                <p>Analyze email senders to detect sender spoofing.</p>
            </div>
        </div>

        <div class="input-group">
            <i class="fas fa-search search-icon"></i>
            <input type="email" id="target-input" placeholder="Enter email address (e.g., example@domain.com)">
            <button id="analyze-btn" class="btn-primary btn-email">Analyze Email</button>
        </div>

        <div id="results-container" class="results-box hidden">
            <div class="results-header">
                <div class="status-group">
                    <div id="status-icon-box" class="icon-circle safe-icon">
                        <i id="status-icon" class="fas fa-check"></i>
                    </div>
                    <div class="status-text">
                        <span class="label">Analysis Status</span>
                        <div class="badge-row">
                            <span id="status-badge" class="badge badge-safe"></span>
                            <span id="confidence-text" class="confidence"></span>
                        </div>
                    </div>
                </div>
                <button id="clear-btn" class="btn-text">Clear Results</button>
            </div>
            <div class="details-section">
                <h4>DETAILS</h4>
                <ul id="details-list"></ul>
            </div>
        </div>
    </div>
</section>
{% endblock %}

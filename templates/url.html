{% extends "base.html" %}
{% block title %}URL Scanner | Phishing Detection{% endblock %}
{% block content %}
<section class="module-screen module-url">
    <div class="analysis-card scanner-card">
        <div class="module-heading">
            <div class="module-icon icon-url"><i class="fas fa-link"></i></div>
            <div>
                <h1>URL Scanner</h1>
                <p>Analyze links for malicious domains and phishing attempts.</p>
            </div>
        </div>

        <div class="input-group">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="target-input" placeholder="Enter URL to scan (e.g., https://example.com)">
            <button id="analyze-btn" class="btn-primary btn-url">Analyze URL</button>
        </div>

        <div id="results-container" class="results-box hidden">
            <div class="results-header">
                <div class="status-group">
                    <div id="status-icon-box" class="icon-circle safe-icon">
                        <i id="status-icon" class="fas fa-check"></i>
                    </div>
                    <div class="status-text">
                        <span class="label">Analysis Status</span>
                        <div class="badge-row">
                            <span id="status-badge" class="badge badge-safe"></span>
                            <span id="confidence-text" class="confidence"></span>
                        </div>
                    </div>
                </div>
                <button id="clear-btn" class="btn-text">Clear Results</button>
            </div>
            <div class="details-section">
                <h4>DETAILS</h4>
                <ul id="details-list"></ul>
            </div>
        </div>
    </div>
</section>
{% endblock %}

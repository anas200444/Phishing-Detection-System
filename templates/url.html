<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QR Code Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <h1>Scan QR Code for Phishing Detection</h1>
    
    <div id="reader" style="width: 500px; margin: auto;"></div>
    
    <div id="result" style="margin-top: 20px; font-weight: bold;"></div>

    <script>
        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById('result').innerText = "Scanned URL: " + decodedText;
            
            html5QrcodeScanner.clear();

            let formData = new FormData();
            formData.append("url", decodedText);

            fetch("/api/analyze/url", {
                method: "POST",
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('result').innerText += "\nAnalysis Result: " + JSON.stringify(data);
            })
            .catch(error => {
                console.error("Error:", error);
            });
        }

        function onScanFailure(error) {
        }

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            { fps: 10, qrbox: {width: 250, height: 250} },
            false);
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>

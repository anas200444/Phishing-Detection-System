{% extends "base.html" %}
{% block title %}SMS Analysis | Phishing Detection{% endblock %}
{% block content %}
<section class="module-screen module-sms">
    <div class="analysis-card scanner-card scanner-card-wide">
        <div class="module-heading">
            <div class="module-icon icon-sms"><i class="far fa-comment-alt"></i></div>
            <div>
                <h1>SMS Analysis</h1>
                <p>Scan text messages for social engineering tactics.</p>
            </div>
        </div>

        <div class="input-group input-group-textarea">
            <textarea id="target-input" placeholder="Paste the suspicious SMS content here to analyze..."></textarea>
        </div>

        <div class="module-actions">
            <button type="button" class="btn-link muted-action"><i class="far fa-file-alt"></i> Upload File / Headers</button>
            <button id="analyze-btn" class="btn-primary btn-sms">Analyze Content</button>
        </div>

        <div id="results-container" class="results-box hidden">
            <div class="results-header">
                <div class="status-group">
                    <div id="status-icon-box" class="icon-circle safe-icon">
                        <i id="status-icon" class="fas fa-check"></i>
                    </div>
                    <div class="status-text">
                        <span class="label">Analysis Status</span>
                        <div class="badge-row">
                            <span id="status-badge" class="badge badge-safe"></span>
                            <span id="confidence-text" class="confidence"></span>
                        </div>
                    </div>
                </div>
                <button id="clear-btn" class="btn-text">Clear Results</button>
            </div>
            <div class="details-section">
                <h4>DETAILS</h4>
                <ul id="details-list"></ul>
            </div>
        </div>
    </div>
</section>
{% endblock %}

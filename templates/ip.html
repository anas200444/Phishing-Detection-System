{% extends "base.html" %}
{% block content %}
<div class="analysis-card">
    <div class="header-text">
        <h1>Multi-Vector Analysis</h1>
        <p>Detect sophisticated phishing attempts across URLs, IPs, Phone Numbers, SMS, and Email.</p>
    </div>
    <div class="tabs">
        <a href="#" class="tab"><i class="fas fa-link"></i> URL</a>
        <a href="/ip" class="tab active"><i class="fas fa-globe"></i> IP</a>
        <a href="/phone" class="tab"><i class="fas fa-phone"></i> Phone</a>
        <a href="#" class="tab"><i class="fas fa-mobile-alt"></i> SMS</a>
        <a href="/email" class="tab"><i class="far fa-envelope"></i> Email</a>
    </div>
    <div class="input-group">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="target-input" placeholder="e.g., 8.8.8.8">
        <button id="analyze-btn" class="btn-primary">Analyze</button>
    </div>
    <div id="results-container" class="results-box hidden">
        <div class="results-header">
            <div class="status-group">
                <div id="status-icon-box" class="icon-circle safe-icon">
                    <i id="status-icon" class="fas fa-check"></i>
                </div>
                <div class="status-text">
                    <span class="label">Analysis Status</span>
                    <div class="badge-row">
                        <span id="status-badge" class="badge badge-safe"></span>
                    </div>
                </div>
            </div>
            <button id="clear-btn" class="btn-text">Clear Results</button>
        </div>
        <div class="details-section">
            <h4>DETAILS</h4>
            <ul id="details-list"></ul>
        </div>
    </div>
</div>
{% endblock %}
